<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Airbnb CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Airbnb App</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/hospede/">Visão Hóspede</a></li>
                    <li class="nav-item"><a class="nav-link" href="/anfitriao/">Visão Anfitrião</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/">Visão Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Restaura a aba que estava ativa antes do recarregamento
        let activeTab = sessionStorage.getItem('activeTab_' + location.pathname);
        if (activeTab) {
            let tabElement = document.querySelector(`button[data-bs-target="${activeTab}"]`);
            if (tabElement) {
                let tab = new bootstrap.Tab(tabElement);
                tab.show();
            }
        }

        // 2. Fica escutando os cliques nas abas para memorizar qual você abriu
        let tabElms = document.querySelectorAll('button[data-bs-toggle="tab"]');
        tabElms.forEach(function(tabElm) {
            tabElm.addEventListener('shown.bs.tab', function (event) {
                let target = event.target.getAttribute("data-bs-target");
                sessionStorage.setItem('activeTab_' + location.pathname, target);
            });
        });

        // 3. Restaura a posição da rolagem da tela (scroll)
        let scrollPos = sessionStorage.getItem('scrollPos_' + location.pathname);
        if (scrollPos) {
            window.scrollTo(0, parseInt(scrollPos));
            sessionStorage.removeItem('scrollPos_' + location.pathname); // Limpa para não bugar outras navegações
        }
    });

    // 4. Salva a posição do scroll exata milissegundos antes de enviar o formulário
    window.addEventListener('beforeunload', function() {
        sessionStorage.setItem('scrollPos_' + location.pathname, window.scrollY);
    });
</script>

</body>
</html>
